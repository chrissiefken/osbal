# Generated by OSBal Loadbalancer Manager

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

listen stats
    bind 127.0.0.1:9000
    mode http
    stats enable
    stats uri /haproxy?stats

frontend frontend_tarpit_service_id
    bind 127.0.0.1:8081
    mode http
    # WAF Rules
    acl is_blacklisted src -f /Users/christophersiefken/Documents/GitHub/osbal/config/blacklist.lst
    http-request deny deny_status 403 if is_blacklisted
    acl is_sqli query -m reg -i (select|insert|update|delete|drop|union)
    http-request tarpit delay 12s if is_sqli
    acl is_xss query -m reg -i (<script|javascript:|onerror|onload|alert\()
    http-request tarpit delay 12s if is_xss
    default_backend backend_tarpit_service_id

backend backend_tarpit_service_id
    mode http
    balance roundrobin
    server backend1 10.0.0.1:8080 check

